version: "3.8"

services:
  mysql:
    container_name: mysql
    image: mysql
    environment:
       MYSQL_DATABASE: devops
       MYSQL_ROOT_PASSWORD: root
    volumes: 
      - mysqld:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      -  mynet
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  flask-app:
    image: sumit1304/two-tier-backend:latest
    container_name: two-tier
    ports: 
      -  "5000:5000"

    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: devops

    depends_on:
      mysql:
        condition: service_healthy 

    networks:
      -  mynet
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  mynet:

volumes:
  mysqld:

